<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CPL Interview Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.09);
      padding: 48px 40px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .logo {
      width: 56px;
      height: 56px;
      background: #1976d2;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .logo svg { width: 30px; height: 30px; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      line-height: 1.55;
      margin-bottom: 32px;
    }

    .cta-btn {
      display: block;
      width: 100%;
      background: #1976d2;
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 13px 20px;
      border-radius: 10px;
      transition: background .15s;
      margin-bottom: 12px;
    }
    .cta-btn:hover { background: #1565c0; }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 24px 0 20px;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .links a {
      font-size: 13px;
      color: #888;
      text-decoration: none;
      transition: color .15s;
    }
    .links a:hover { color: #1976d2; }

    .badge {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
      margin-bottom: 20px;
      letter-spacing: 0.3px;
    }

    .steps {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .step {
      font-size: 11px;
      color: #999;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 4px 10px;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </div>

  <div class="badge">Northeastern University · CPL</div>

  <h1>CPL Interview Assistant</h1>
  <p class="subtitle">
    Document your prior learning for academic credit through a structured, guided interview.
  </p>

  <div class="steps">
    <span class="step">Welcome</span>
    <span class="step">›</span>
    <span class="step">Course</span>
    <span class="step">›</span>
    <span class="step">Experience</span>
    <span class="step">›</span>
    <span class="step">Skills</span>
    <span class="step">›</span>
    <span class="step">Evidence</span>
    <span class="step">›</span>
    <span class="step">Summary</span>
  </div>

  <a href="/chat" class="cta-btn">Start Interview</a>

  <hr class="divider" />

  <div class="links">
    <a href="/admin">Admin</a>
    <a href="/health">Health</a>
    <a href="/dbcheck">DB Check</a>
  </div>
</div>

</body>
</html>
