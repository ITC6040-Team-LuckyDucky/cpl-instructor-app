<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CPL Chat</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; }
      textarea { width: 100%; height: 120px; }
      pre { white-space: pre-wrap; padding: 12px; border: 1px solid #ddd; }

      /* File upload styles */
      .upload-section {
        margin: 20px 0;
        padding: 20px;
        border: 2px dashed #ccc;
        border-radius: 8px;
        background-color: #f9f9f9;
      }
      .upload-section.dragover {
        border-color: #4CAF50;
        background-color: #e8f5e9;
      }
      .file-input-wrapper {
        margin: 10px 0;
      }
      .selected-file {
        margin: 10px 0;
        padding: 8px;
        background-color: #e3f2fd;
        border-radius: 4px;
        font-size: 14px;
      }
      .upload-btn {
        background-color: #4CAF50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .upload-btn:hover {
        background-color: #45a049;
      }
      .upload-btn:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
      }
      #uploadedFiles {
        margin-top: 16px;
      }
      #uploadedFiles h4 {
        margin: 0 0 8px;
        font-size: 14px;
        color: #555;
      }
      .file-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .file-list li {
        padding: 6px 8px;
        border-bottom: 1px solid #e0e0e0;
        font-size: 13px;
        display: flex;
        justify-content: space-between;
      }
      .file-list li:last-child {
        border-bottom: none;
      }
      .file-list .file-size {
        color: #888;
      }
    </style>
  </head>
  <body>
    <h2>CPL Chat Demo</h2>
    <p>Type a prompt and call Azure OpenAI through the Web App.</p>

    <textarea id="msg" placeholder="Ask something..."></textarea>
    <br/><br/>
    <button id="send">Send</button>

    <h3>Upload Documents</h3>
    <div class="upload-section" id="dropZone">
      <p>Drag and drop a file here, or click to select</p>
      <div class="file-input-wrapper">
        <input type="file" id="fileInput" accept=".pdf,.docx,.txt" />
      </div>
      <div id="selectedFile" class="selected-file" style="display: none;"></div>
      <button id="uploadBtn" class="upload-btn" disabled>Upload</button>
      <div id="uploadedFiles"></div>
    </div>

    <h3>Response</h3>
    <pre id="out"></pre>

    <script>
      // Chat functionality
      document.getElementById("send").addEventListener("click", async () => {
        const msg = document.getElementById("msg").value.trim();
        const out = document.getElementById("out");
        out.textContent = "Thinking...";

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: msg }),
          });

          const data = await res.json();
          if (!res.ok) {
            out.textContent = data.error || "Request failed";
            return;
          }
          out.textContent = data.answer || "";
        } catch (e) {
          out.textContent = "Network error";
        }
      });

      // File upload functionality
      const fileInput = document.getElementById("fileInput");
      const dropZone = document.getElementById("dropZone");
      const selectedFileDiv = document.getElementById("selectedFile");
      const uploadBtn = document.getElementById("uploadBtn");
      let selectedFile = null;

      // Handle file selection
      fileInput.addEventListener("change", (e) => {
        if (e.target.files.length > 0) {
          selectedFile = e.target.files[0];
          displaySelectedFile(selectedFile);
        }
      });

      // Handle drag and drop
      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });

      dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("dragover");
      });

      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");

        const files = e.dataTransfer.files;
        if (files.length > 0) {
          const file = files[0];
          // Check file type
          const allowedTypes = [".pdf", ".docx", ".txt"];
          const fileExt = "." + file.name.split(".").pop().toLowerCase();

          if (allowedTypes.includes(fileExt)) {
            selectedFile = file;
            fileInput.files = files; // Update file input
            displaySelectedFile(file);
          } else {
            alert("Please select a PDF, DOCX, or TXT file.");
          }
        }
      });

      // Display selected file
      function displaySelectedFile(file) {
        selectedFileDiv.textContent = `Selected: ${file.name} (${formatFileSize(file.size)})`;
        selectedFileDiv.style.display = "block";
        uploadBtn.disabled = false;
      }

      // Format file size
      function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(1) + " MB";
      }

      // Handle file upload
      // Load and display uploaded files
      async function loadUploadedFiles() {
        const container = document.getElementById("uploadedFiles");
        try {
          const res = await fetch("/api/uploads");
          const data = await res.json();
          if (!res.ok || !data.uploads) { container.innerHTML = ""; return; }

          if (data.uploads.length === 0) {
            container.innerHTML = "<h4>Uploaded Files</h4><p style='font-size:13px;color:#888;'>No files uploaded yet.</p>";
            return;
          }

          const items = data.uploads.map(u =>
            `<li><span>${u.filename}</span><span class="file-size">${formatFileSize(u.size)}</span></li>`
          ).join("");
          container.innerHTML = `<h4>Uploaded Files</h4><ul class="file-list">${items}</ul>`;
        } catch (e) {
          container.innerHTML = "";
        }
      }

      // Load file list on page load
      loadUploadedFiles();

      uploadBtn.addEventListener("click", async () => {
        if (!selectedFile) return;

        const formData = new FormData();
        formData.append("file", selectedFile);

        uploadBtn.disabled = true;
        uploadBtn.textContent = "Uploading...";

        try {
          const res = await fetch("/api/upload", {
            method: "POST",
            body: formData,
          });

          const data = await res.json();

          if (!res.ok) {
            alert("Upload failed: " + (data.error || "Unknown error"));
          } else {
            alert("Upload successful!");
            // Reset form
            fileInput.value = "";
            selectedFile = null;
            selectedFileDiv.style.display = "none";
            loadUploadedFiles();
          }
        } catch (e) {
          alert("Network error during upload");
        } finally {
          uploadBtn.disabled = false;
          uploadBtn.textContent = "Upload";
        }
      });
    </script>
  </body>
</html>
