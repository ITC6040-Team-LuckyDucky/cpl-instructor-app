<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CPL Interview Assistant</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: #fff;
      padding: 12px 20px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }
    .header h1 { font-size: 17px; color: #1a1a2e; font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .session-label { font-size: 12px; color: #999; }
    .session-label code { color: #555; }
    .new-session-btn {
      font-size: 12px; color: #555; background: none;
      border: 1px solid #ddd; border-radius: 6px;
      padding: 5px 10px; cursor: pointer;
    }
    .new-session-btn:hover { background: #f5f5f5; }

    /* ── Stage progress bar ── */
    .stage-bar {
      background: #fff;
      padding: 8px 20px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .stage-bar::-webkit-scrollbar { display: none; }
    .stage-pill {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 12px;
      white-space: nowrap;
      color: #bbb;
      background: #f5f5f5;
      transition: background .2s, color .2s;
    }
    .stage-pill.done  { color: #4CAF50; background: #e8f5e9; }
    .stage-pill.active { color: #fff; background: #1976d2; }
    .stage-arrow { font-size: 11px; color: #ccc; flex-shrink: 0; }

    /* ── Chat message area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-inner {
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Message bubbles ── */
    .message { display: flex; flex-direction: column; max-width: 72%; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot  { align-self: flex-start; align-items: flex-start; }
    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .message.user .bubble {
      background: #1976d2;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.bot .bubble {
      background: #fff;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,.08);
      white-space: pre-wrap;
    }
    .msg-time {
      font-size: 11px;
      color: #bbb;
      margin-top: 3px;
      padding: 0 4px;
    }

    /* ── Typing indicator ── */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      background: #fff;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,.08);
      width: fit-content;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #bbb;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* ── Bottom panel ── */
    .bottom-panel {
      background: #fff;
      border-top: 1px solid #e8e8e8;
      flex-shrink: 0;
      padding: 10px 20px 14px;
    }
    .bottom-inner { max-width: 760px; margin: 0 auto; }

    /* Summary result card */
    .summary-card {
      display: none;
      background: #f1f8f1;
      border: 2px solid #4CAF50;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .summary-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .summary-card-header h4 { color: #2e7d32; font-size: 14px; }
    .summary-card-actions { display: flex; gap: 6px; align-items: center; }
    .summary-collapse-btn {
      background: none; border: none;
      color: #2e7d32; font-size: 13px;
      cursor: pointer; padding: 2px 6px;
      border-radius: 4px; line-height: 1;
    }
    .summary-collapse-btn:hover { background: #c8e6c9; }
    .summary-body.expanded { max-height: 280px; overflow-y: auto; }
    .summary-body {
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.6;
      color: #333;
      overflow: hidden;
    }
    .summary-body.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .summary-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .regen-btn, .toggle-btn, .download-btn {
      background: none; border: 1px solid #4CAF50; color: #2e7d32;
      border-radius: 6px; padding: 4px 12px; font-size: 12px;
      cursor: pointer;
    }
    .regen-btn:hover, .toggle-btn:hover, .download-btn:hover { background: #e8f5e9; }
    .regen-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* Summary version badge + timestamp */
    .summary-meta { margin-top: 5px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .summary-version-badge {
      display: inline-block;
      background: #1976d2;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }
    .summary-timestamp {
      font-size: 11px;
      color: #999;
    }

    /* Toast — top-center, larger */
    .summary-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1b5e20;
      color: #fff;
      padding: 12px 28px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      box-shadow: 0 4px 18px rgba(0,0,0,.25);
      opacity: 1;
      transition: opacity .6s ease;
      z-index: 2000;
      pointer-events: none;
      white-space: nowrap;
    }
    .summary-toast.fade-out { opacity: 0; }

    /* Panel highlight flash on update */
    @keyframes summary-flash {
      0%   { background: #fffde7; border-color: #f9a825; }
      60%  { background: #fffde7; border-color: #f9a825; }
      100% { background: #f1f8f1; border-color: #4CAF50; }
    }
    .summary-card.flash { animation: summary-flash 1.4s ease-out forwards; }

    /* Version badge bounce on update */
    @keyframes badge-bounce {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.35); }
      60%  { transform: scale(0.92); }
      100% { transform: scale(1); }
    }
    .summary-version-badge.bounce { animation: badge-bounce .5s ease-out; }

    /* Toggle button pulse when panel is collapsed and summary updates */
    @keyframes btn-glow {
      0%, 100% { box-shadow: none; }
      50%       { box-shadow: 0 0 0 4px rgba(25,118,210,.35); }
    }
    .toggle-btn.glow { animation: btn-glow 1s ease-in-out 3; }

    /* ── File preview card ── */
    .file-preview-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .file-type-badge {
      width: 40px; height: 40px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .file-type-badge.pdf  { background: #fde8e8; color: #c62828; }
    .file-type-badge.doc,
    .file-type-badge.docx { background: #e3f2fd; color: #1565c0; }
    .file-type-badge.txt  { background: #f5f5f5; color: #616161; }
    .file-type-badge.other { background: #f3e5f5; color: #6a1b9a; }
    .file-preview-info { flex: 1; min-width: 0; }
    .file-preview-name {
      font-size: 13px; font-weight: 500; color: #1a1a1a;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-preview-size { font-size: 11px; color: #999; margin-top: 2px; }
    .file-preview-upload-btn {
      background: #1976d2; color: #fff;
      border: none; border-radius: 8px;
      padding: 6px 16px; font-size: 13px; font-weight: 500;
      cursor: pointer; flex-shrink: 0;
      transition: background .15s;
    }
    .file-preview-upload-btn:hover { background: #1565c0; }
    .file-preview-upload-btn:disabled { background: #ccc; cursor: not-allowed; }
    .file-preview-remove-btn {
      background: none; border: none;
      color: #aaa; font-size: 18px; line-height: 1;
      cursor: pointer; padding: 4px 6px;
      border-radius: 50%; flex-shrink: 0;
      transition: background .15s, color .15s;
    }
    .file-preview-remove-btn:hover { background: #f5f5f5; color: #555; }

    /* Input bar */
    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .attach-btn {
      background: none; border: none;
      color: #888; font-size: 20px;
      cursor: pointer; padding: 6px;
      border-radius: 50%; flex-shrink: 0;
      line-height: 1;
    }
    .attach-btn:hover { background: #f0f0f0; }
    #msgInput {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      background: #fafafa;
    }
    #msgInput:focus { border-color: #1976d2; background: #fff; }
    #msgInput:disabled { background: #f0f0f0; }
    .send-btn {
      width: 40px; height: 40px;
      background: #1976d2; color: #fff;
      border: none; border-radius: 50%;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .send-btn:hover { background: #1565c0; }
    .send-btn:disabled { background: #ccc; cursor: not-allowed; }

    /* Upload drawer (drag/drop only) */
    .upload-drawer {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #f0f0f0;
    }
    .upload-drawer.open { display: block; }
    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 14px;
      text-align: center;
      background: #fafafa;
      font-size: 13px;
      color: #666;
      cursor: pointer;
    }
    .drop-zone.dragover { border-color: #4CAF50; background: #e8f5e9; }
    .drop-zone label { color: #1976d2; cursor: pointer; }

    /* File chips (uploaded files list) */
    .file-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chip {
      display: flex; align-items: center; gap: 5px;
      background: #e3f2fd;
      border-radius: 14px;
      padding: 3px 10px;
      font-size: 12px; color: #1565c0;
    }
    .chip-size { color: #888; }

    /* ── Quick-reply choice buttons ── */
    .choice-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
      align-self: flex-start;
    }
    .choice-group.inline { flex-direction: row; }
    .choice-btn {
      background: #fff;
      border: 1.5px solid #1976d2;
      color: #1976d2;
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .choice-btn:hover  { background: #e3f0fd; }
    .choice-btn:disabled { opacity: .45; cursor: default; background: #f5f5f5; border-color: #ccc; color: #999; }

    /* Scrollbar (chat area) */
    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <h1>CPL Interview Assistant</h1>
  <div class="header-right">
    <span class="session-label">Session: <code id="sessionLabel">starting…</code></span>
    <button class="new-session-btn" id="newSessionBtn">+ New Session</button>
  </div>
</header>

<!-- ── Stage progress bar ── -->
<div class="stage-bar" id="stageBar">
  <span class="stage-pill active" data-stage="welcome">Welcome</span>
  <span class="stage-arrow">›</span>
  <span class="stage-pill" data-stage="course_id">Course</span>
  <span class="stage-arrow">›</span>
  <span class="stage-pill" data-stage="experience">Experience</span>
  <span class="stage-arrow">›</span>
  <span class="stage-pill" data-stage="skills_reflection">Skills</span>
  <span class="stage-arrow">›</span>
  <span class="stage-pill" data-stage="evidence">Evidence</span>
  <span class="stage-arrow">›</span>
  <span class="stage-pill" data-stage="summary">Summary</span>
</div>

<!-- ── Chat messages ── -->
<div class="chat-area" id="chatArea">
  <div class="chat-inner" id="chatInner"></div>
</div>

<!-- ── Bottom panel ── -->
<div class="bottom-panel">
  <div class="bottom-inner">

    <!-- Summary card (appears after generation) -->
    <div class="summary-card" id="summaryCard">
      <div class="summary-card-header">
        <div>
          <h4>CPL Portfolio Summary</h4>
          <div class="summary-meta" id="summaryMeta" style="display:none">
            <span class="summary-version-badge" id="summaryVersionBadge"></span>
            <span class="summary-timestamp" id="summaryTimestamp"></span>
          </div>
        </div>
        <div class="summary-card-actions">
          <button class="download-btn" id="downloadSummaryBtn" title="Download summary + uploaded documents as ZIP">Download Package</button>
          <button class="summary-collapse-btn" id="summaryCollapseBtn" title="Collapse summary">▲ Hide</button>
        </div>
      </div>
      <div class="summary-body collapsed" id="summaryText"></div>
      <div class="summary-footer">
        <button class="toggle-btn" id="toggleSummaryBtn">Show Full Summary</button>
        <button class="regen-btn" id="regenSummaryBtn">Regenerate</button>
      </div>
    </div>

    <!-- File preview card (appears when a file is selected) -->
    <div class="file-preview-card" id="filePreviewCard" style="display:none">
      <div class="file-type-badge other" id="fileTypeBadge">FILE</div>
      <div class="file-preview-info">
        <div class="file-preview-name" id="filePreviewName"></div>
        <div class="file-preview-size" id="filePreviewSize"></div>
      </div>
      <button class="file-preview-upload-btn" id="filePreviewUploadBtn">Upload</button>
      <button class="file-preview-remove-btn" id="filePreviewRemoveBtn" title="Remove file">✕</button>
    </div>

    <!-- Input row -->
    <div class="input-row">
      <button class="attach-btn" id="uploadToggleBtn" title="Upload a document">&#128206;</button>
      <input type="file" id="fileInput" accept=".pdf,.docx,.txt" style="display:none" />
      <input type="text" id="msgInput" placeholder="Type a message…" autocomplete="off" />
      <button class="send-btn" id="sendBtn" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>

    <!-- Upload drawer (drag/drop fallback) -->
    <div class="upload-drawer" id="uploadDrawer">
      <div class="drop-zone" id="dropZone">
        Drag &amp; drop a file here, or
        <label for="fileInput">browse</label>
      </div>
      <div class="file-chips" id="uploadedFiles"></div>
    </div>

  </div>
</div>

<script>
  // ─────────────────────────────────────────────
  // Stage definitions (must match backend INTERVIEW_STAGES)
  // ─────────────────────────────────────────────
  const STAGES = ["welcome", "course_id", "experience", "skills_reflection", "evidence", "summary"];

  let summaryAutoGenTriggered = false;

  function updateStageUI(stage) {
    const previousStage = currentStage;
    currentStage = stage;
    const idx = STAGES.indexOf(stage);
    document.querySelectorAll(".stage-pill").forEach((el, i) => {
      el.classList.remove("active", "done");
      if (i < idx)       el.classList.add("done");
      else if (i === idx) el.classList.add("active");
    });
    // Auto-generate the summary the first time we enter the summary stage
    if (stage === "summary" && previousStage !== "summary" && !summaryAutoGenTriggered) {
      summaryAutoGenTriggered = true;
      triggerInitialSummaryGeneration();
    }
  }

  async function triggerInitialSummaryGeneration() {
    if (!sessionId) return;
    const card      = document.getElementById("summaryCard");
    const bodyEl    = document.getElementById("summaryText");
    const toggleBtn = document.getElementById("toggleSummaryBtn");
    try {
      const res  = await fetch(`/api/session/${sessionId}/summary`, { method: "POST" });
      const data = await res.json();
      if (res.ok && data.summary) {
        bodyEl.textContent = data.summary;
        bodyEl.classList.add("collapsed");
        bodyEl.classList.remove("expanded");
        toggleBtn.textContent = "Show Full Summary";
        card.style.display = "block";
        summaryVersion++;
        updateSummaryMeta();
        pulseSummaryCard();
        showSummaryToast();
        card.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    } catch (e) {
      // Silent failure — the Regenerate button is still available
    }
  }

  // ─────────────────────────────────────────────
  // Session management
  // ─────────────────────────────────────────────
  let sessionId    = null;
  let currentStage = "welcome";

  async function initSession() {
    try {
      const res  = await fetch("/api/session", { method: "POST" });
      const data = await res.json();
      if (!res.ok) { console.error("Session init failed", data); return; }
      sessionId = data.session_id;
      document.getElementById("sessionLabel").textContent = sessionId.slice(0, 8) + "…";
      updateStageUI(data.stage || "welcome");
      await fetchGreeting();
    } catch (e) {
      console.error("Network error starting session", e);
    }
  }

  const FALLBACK_GREETING = "Hi! I'm your CPL Interview Assistant. I'll guide you through a structured interview to help document your prior learning for academic credit. Let's start — what's your name?";

  async function fetchGreeting() {
    if (!sessionId) return;
    showTyping();
    try {
      const res  = await fetch(`/api/chat/greeting?session_id=${encodeURIComponent(sessionId)}`);
      const data = await res.json();
      hideTyping();
      if (res.ok && data.greeting) {
        appendMessage("bot", data.greeting);
      } else {
        appendMessage("bot", FALLBACK_GREETING);
      }
    } catch (e) {
      hideTyping();
      appendMessage("bot", FALLBACK_GREETING);
      console.error("Failed to load greeting", e);
    }
  }

  document.getElementById("newSessionBtn").addEventListener("click", async () => {
    document.getElementById("chatInner").innerHTML = "";
    document.getElementById("msgInput").value = "";
    document.getElementById("summaryCard").style.display = "none";
    document.getElementById("summaryText").textContent = "";
    document.getElementById("summaryText").classList.add("collapsed");
    document.getElementById("toggleSummaryBtn").textContent = "Show Full Summary";
    document.getElementById("summaryMeta").style.display = "none";
    document.getElementById("summaryVersionBadge").textContent = "";
    document.getElementById("summaryTimestamp").textContent = "";
    summaryVersion = 0;
    summaryAutoGenTriggered = false;
    clearSelectedFile();
    await initSession();
  });

  // ─────────────────────────────────────────────
  // Message rendering helpers
  // ─────────────────────────────────────────────
  function fmtTime(d) {
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  // ── Choice button helpers ──────────────────────
  // Parse "A: ...\nB: ...\nC: ..." lines out of a bot message.
  // Returns { intro, choices: [{label, text}, …] } or null if not found.
  function parseABCOptions(text) {
    const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
    const choiceRe = /^([A-Ca-c])[):.]\s*(.+)/;
    const choices = [];
    const introLines = [];
    for (const line of lines) {
      const m = line.match(choiceRe);
      if (m) choices.push({ label: m[1].toUpperCase(), text: m[2] });
      else if (choices.length === 0) introLines.push(line);
    }
    if (choices.length >= 2) return { intro: introLines.join("\n"), choices };
    return null;
  }

  // Returns true only for genuinely binary yes/no questions.
  // A question qualifies only if it starts with a binary opener AND
  // does not contain any open-ended word that signals a descriptive answer.
  const YES_NO_OPENERS = [
    /^are you\b/i, /^do you\b/i, /^did you\b/i,
    /^is there\b/i, /^have you\b/i, /^would you like to\b/i,
  ];
  const OPEN_ENDED_WORDS = [
    /\bwhich\b/i, /\bwhat\b/i, /\bhow\b/i, /\bwhere\b/i,
    /\bwhen\b/i,  /\bwho\b/i,  /\bwhy\b/i,
    /\bdescribe\b/i, /\bexplain\b/i, /\btell me\b/i,
    /\bwalk me through\b/i, /\bshare\b/i,
  ];
  function isYesNoQuestion(text) {
    if (!text.includes("?")) return false;
    // Find the sentence that actually contains the question mark
    const sentences = text.split(/(?<=[.!?])\s+/);
    const questionSentences = sentences.filter(s => s.includes("?"));
    return questionSentences.some(sentence => {
      const trimmed = sentence.trim();
      const startsWithBinaryOpener = YES_NO_OPENERS.some(re => re.test(trimmed));
      if (!startsWithBinaryOpener) return false;
      const containsOpenEnded = OPEN_ENDED_WORDS.some(re => re.test(trimmed));
      return !containsOpenEnded;
    });
  }

  // Render a group of choice buttons beneath a message wrapper.
  // choices: [{label, text}, …] or [{label: "Yes"}, {label: "No"}]
  // inline: true → side-by-side (yes/no); false → stacked (A/B/C)
  function appendChoiceButtons(wrapper, choices, inline) {
    const group = document.createElement("div");
    group.className = "choice-group" + (inline ? " inline" : "");

    choices.forEach(({ label, text }) => {
      const btn = document.createElement("button");
      btn.className = "choice-btn";
      btn.textContent = text ? `${label}: ${text}` : label;
      btn.addEventListener("click", () => {
        // Disable all buttons in this group so the user can't click again
        group.querySelectorAll(".choice-btn").forEach(b => { b.disabled = true; });
        // Send just the label letter (or "Yes"/"No") as the chat message
        sendChatMessage(label);
      });
      group.appendChild(btn);
    });

    wrapper.appendChild(group);
  }

  function appendMessage(role, text) {
    const inner   = document.getElementById("chatInner");
    const wrapper = document.createElement("div");
    wrapper.className = `message ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    const time = document.createElement("div");
    time.className = "msg-time";
    time.textContent = fmtTime(new Date());

    if (role === "bot") {
      // ── Try to detect A/B/C multiple-choice ──
      const abc = parseABCOptions(text);
      if (abc) {
        bubble.textContent = abc.intro || text;
        wrapper.appendChild(bubble);
        wrapper.appendChild(time);
        inner.appendChild(wrapper);
        appendChoiceButtons(wrapper, abc.choices, false);
        scrollToBottom();
        return;
      }

      // ── Try to detect yes/no question ──
      if (isYesNoQuestion(text)) {
        bubble.textContent = text;
        wrapper.appendChild(bubble);
        wrapper.appendChild(time);
        inner.appendChild(wrapper);
        appendChoiceButtons(wrapper, [{ label: "Yes" }, { label: "No" }], true);
        scrollToBottom();
        return;
      }
    }

    // Default: plain text
    bubble.textContent = text;
    wrapper.appendChild(bubble);
    wrapper.appendChild(time);
    inner.appendChild(wrapper);
    scrollToBottom();
  }

  function showTyping() {
    const inner = document.getElementById("chatInner");
    const el    = document.createElement("div");
    el.className = "message bot";
    el.id = "typingMsg";
    el.innerHTML = '<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    inner.appendChild(el);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById("typingMsg");
    if (el) el.remove();
  }

  function scrollToBottom() {
    const area = document.getElementById("chatArea");
    area.scrollTop = area.scrollHeight;
  }

  // ─────────────────────────────────────────────
  // Chat send
  // ─────────────────────────────────────────────
  const msgInput = document.getElementById("msgInput");
  const sendBtn  = document.getElementById("sendBtn");

  // Returns true if the message is substantive enough to warrant a summary regen.
  // Filters out short acknowledgements like "yes", "no", "ok", "thanks", etc.
  const TRIVIAL_REPLIES = new Set([
    "yes", "no", "ok", "okay", "sure", "yep", "nope", "yea", "yeah",
    "nah", "thanks", "thank you", "got it", "done", "fine", "alright",
    "nothing", "none", "not really", "i'm good", "im good", "all good",
  ]);
  function isSubstantiveMessage(msg) {
    const trimmed = msg.trim().toLowerCase();
    if (TRIVIAL_REPLIES.has(trimmed)) return false;
    return trimmed.split(/\s+/).length > 5;
  }

  // Silently regenerates the summary and updates the card if it's visible.
  async function autoRegenSummary() {
    if (!sessionId) return;
    try {
      const card    = document.getElementById("summaryCard");
      const bodyEl  = document.getElementById("summaryText");
      const toggleBtn = document.getElementById("toggleSummaryBtn");
      const regenRes  = await fetch(`/api/session/${sessionId}/summary`, { method: "POST" });
      const regenData = await regenRes.json();
      if (regenRes.ok && regenData.summary) {
        bodyEl.textContent = regenData.summary;
        bodyEl.classList.add("collapsed");
        bodyEl.classList.remove("expanded");
        toggleBtn.textContent = "Show Full Summary";
        card.style.display = "block";
        summaryVersion++;   // increment ONLY here, after confirmed new summary received
        updateSummaryMeta();
        pulseSummaryCard();
        showSummaryToast();
      }
    } catch (e) {
      // Silent failure — the user can always click Regenerate manually
    }
  }

  // Core chat API call — accepts an explicit message string.
  // Pass isUploadMessage=true when the message is the auto-sent "I just uploaded …"
  // acknowledgement — in that case we skip updating the stage UI so an upload can
  // never visually jump the stage forward before the user confirms they're done.
  async function sendChatMessage(msg, { isUploadMessage = false } = {}) {
    if (!sessionId) {
      appendMessage("bot", "No active session — please wait or click + New Session.");
      return;
    }

    msgInput.disabled = true;
    sendBtn.disabled  = true;

    appendMessage("user", msg);
    showTyping();

    try {
      const res  = await fetch("/api/chat", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ message: msg, session_id: sessionId }),
      });
      const data = await res.json();
      hideTyping();

      if (!res.ok) {
        appendMessage("bot", "Error: " + (data.error || "Request failed"));
      } else {
        appendMessage("bot", data.answer || "");

        // Never let an auto-upload message move the stage forward in the UI —
        // the server guarantees the same, but this is a belt-and-suspenders guard.
        if (!isUploadMessage) {
          updateStageUI(data.stage || "welcome");
        }

        // Auto-regenerate the summary if we're in the summary stage and the
        // user sent a substantive message (not just "yes", "no", "ok", etc.)
        if (currentStage === "summary" && isSubstantiveMessage(msg)) {
          autoRegenSummary();
        }
      }
    } catch (e) {
      hideTyping();
      appendMessage("bot", "Network error — please try again.");
    } finally {
      msgInput.disabled = false;
      sendBtn.disabled  = false;
      msgInput.focus();
    }
  }

  // Send button / Enter key — reads from the input field
  async function sendMessage() {
    const msg = msgInput.value.trim();
    if (!msg) return;
    msgInput.value = "";
    await sendChatMessage(msg);
  }

  sendBtn.addEventListener("click", sendMessage);
  msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ─────────────────────────────────────────────
  // Summary version tracking + feedback helpers
  // ─────────────────────────────────────────────
  let summaryVersion = 0;

  function showSummaryToast() {
    const existing = document.getElementById("summaryToast");
    if (existing) existing.remove();
    const toast = document.createElement("div");
    toast.id = "summaryToast";
    toast.className = "summary-toast";
    toast.textContent = summaryVersion === 1
      ? "✓ Summary ready"
      : `✓ Summary updated to Version ${summaryVersion}`;
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.classList.add("fade-out");
      setTimeout(() => toast.remove(), 600);
    }, 3500);
  }

  function updateSummaryMeta() {
    // NOTE: summaryVersion must be incremented by the caller AFTER a confirmed
    // successful API response — never increment it here.
    const metaEl     = document.getElementById("summaryMeta");
    const badgeEl    = document.getElementById("summaryVersionBadge");
    const tsEl       = document.getElementById("summaryTimestamp");
    const now = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    badgeEl.textContent = `Version ${summaryVersion}`;
    tsEl.textContent    = `Last updated: ${now}`;
    metaEl.style.display = "flex";

    // Bounce the badge
    badgeEl.classList.remove("bounce");
    void badgeEl.offsetWidth;
    badgeEl.classList.add("bounce");
    badgeEl.addEventListener("animationend", () => badgeEl.classList.remove("bounce"), { once: true });
  }

  function pulseSummaryCard() {
    const card      = document.getElementById("summaryCard");
    const toggleBtn = document.getElementById("toggleSummaryBtn");
    const isCollapsed = document.getElementById("summaryText").classList.contains("collapsed");

    // Flash the whole card if visible/expanded; otherwise glow the toggle button
    if (!isCollapsed) {
      card.classList.remove("flash");
      void card.offsetWidth;
      card.classList.add("flash");
      card.addEventListener("animationend", () => card.classList.remove("flash"), { once: true });
    } else {
      toggleBtn.classList.remove("glow");
      void toggleBtn.offsetWidth;
      toggleBtn.classList.add("glow");
      toggleBtn.addEventListener("animationend", () => toggleBtn.classList.remove("glow"), { once: true });
    }
  }

  // ─────────────────────────────────────────────
  // Summary generation
  // ─────────────────────────────────────────────
  async function doGenerateSummary(btn) {
    if (!sessionId) return;
    const card    = document.getElementById("summaryCard");
    const bodyEl  = document.getElementById("summaryText");
    const toggleBtn = document.getElementById("toggleSummaryBtn");

    btn.disabled    = true;
    btn.textContent = "Generating…";

    try {
      const res  = await fetch(`/api/session/${sessionId}/summary`, { method: "POST" });
      const data = await res.json();
      if (!res.ok) {
        alert("Summary failed: " + (data.error || "Unknown error"));
        return;
      }
      bodyEl.textContent = data.summary;
      bodyEl.classList.add("collapsed");
      bodyEl.classList.remove("expanded");
      toggleBtn.textContent = "Show Full Summary";
      card.style.display = "block";
      summaryVersion++;   // increment ONLY here, after confirmed new summary received
      updateSummaryMeta();
      pulseSummaryCard();
      showSummaryToast();
      card.scrollIntoView({ behavior: "smooth", block: "nearest" });
    } catch (e) {
      alert("Network error generating summary.");
    } finally {
      btn.disabled    = false;
      btn.textContent = "Regenerate";
    }
  }

  document.getElementById("regenSummaryBtn").addEventListener("click", (e) => doGenerateSummary(e.currentTarget));

  function collapseSummary() {
    const bodyEl    = document.getElementById("summaryText");
    const toggleBtn = document.getElementById("toggleSummaryBtn");
    bodyEl.classList.add("collapsed");
    bodyEl.classList.remove("expanded");
    toggleBtn.textContent = "Show Full Summary";
  }

  document.getElementById("toggleSummaryBtn").addEventListener("click", () => {
    const bodyEl    = document.getElementById("summaryText");
    const toggleBtn = document.getElementById("toggleSummaryBtn");
    const isCollapsed = bodyEl.classList.contains("collapsed");
    if (isCollapsed) {
      bodyEl.classList.remove("collapsed");
      bodyEl.classList.add("expanded");
      toggleBtn.textContent = "Hide Summary";
    } else {
      collapseSummary();
    }
  });

  document.getElementById("summaryCollapseBtn").addEventListener("click", collapseSummary);

  document.getElementById("downloadSummaryBtn").addEventListener("click", () => {
    if (!sessionId) return;
    // Trigger a ZIP download from the server — includes summary + all uploaded documents
    const a = document.createElement("a");
    a.href = `/api/session/${encodeURIComponent(sessionId)}/download`;
    a.download = `cpl-package-${sessionId.slice(0, 8)}.zip`;
    a.click();
  });

  // ─────────────────────────────────────────────
  // File size formatter
  // ─────────────────────────────────────────────
  function fmtSize(b) {
    if (b < 1024)           return b + " B";
    if (b < 1024 * 1024)    return (b / 1024).toFixed(1) + " KB";
    return (b / (1024 * 1024)).toFixed(1) + " MB";
  }
  const formatFileSize = fmtSize;

  // ─────────────────────────────────────────────
  // File preview card
  // ─────────────────────────────────────────────
  const fileInput          = document.getElementById("fileInput");
  const filePreviewCard    = document.getElementById("filePreviewCard");
  const fileTypeBadge      = document.getElementById("fileTypeBadge");
  const filePreviewName    = document.getElementById("filePreviewName");
  const filePreviewSize    = document.getElementById("filePreviewSize");
  const filePreviewUploadBtn = document.getElementById("filePreviewUploadBtn");
  const filePreviewRemoveBtn = document.getElementById("filePreviewRemoveBtn");
  let selectedFile = null;

  const EXT_CLASSES = { pdf: "pdf", doc: "doc", docx: "docx", txt: "txt" };

  function setSelectedFile(file) {
    selectedFile = file;
    const ext = file.name.split(".").pop().toLowerCase();
    const badgeClass = EXT_CLASSES[ext] || "other";

    fileTypeBadge.className = `file-type-badge ${badgeClass}`;
    fileTypeBadge.textContent = ext.toUpperCase();
    filePreviewName.textContent = file.name;
    filePreviewSize.textContent = fmtSize(file.size);
    filePreviewUploadBtn.disabled = false;

    filePreviewCard.style.display = "flex";
    // Close the drawer once a file is chosen
    document.getElementById("uploadDrawer").classList.remove("open");
  }

  function clearSelectedFile() {
    selectedFile = null;
    fileInput.value = "";
    filePreviewCard.style.display = "none";
    filePreviewUploadBtn.disabled = true;
  }

  filePreviewRemoveBtn.addEventListener("click", clearSelectedFile);

  // ─────────────────────────────────────────────
  // Attach button — opens file picker directly
  // ─────────────────────────────────────────────
  document.getElementById("uploadToggleBtn").addEventListener("click", () => {
    fileInput.click();
  });

  fileInput.addEventListener("change", (e) => {
    if (e.target.files.length > 0) setSelectedFile(e.target.files[0]);
  });

  // ─────────────────────────────────────────────
  // Drag and drop (opens drawer on drag enter)
  // ─────────────────────────────────────────────
  const dropZone = document.getElementById("dropZone");

  dropZone.addEventListener("dragover",  (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", ()  => { dropZone.classList.remove("dragover"); });
  dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const ext = "." + file.name.split(".").pop().toLowerCase();
    if ([".pdf", ".docx", ".txt"].includes(ext)) {
      setSelectedFile(file);
    } else {
      alert("Please select a PDF, DOCX, or TXT file.");
    }
  });

  // Open drawer on drag over the bottom panel
  document.getElementById("bottomPanel") // fallback: listen on document
  document.addEventListener("dragover", (e) => {
    e.preventDefault();
    document.getElementById("uploadDrawer").classList.add("open");
  });

  // ─────────────────────────────────────────────
  // Upload — triggered by preview card button
  // ─────────────────────────────────────────────
  async function loadUploadedFiles() {
    const container = document.getElementById("uploadedFiles");
    try {
      const url = sessionId ? `/api/uploads?session_id=${encodeURIComponent(sessionId)}` : "/api/uploads";
      const res  = await fetch(url);
      const data = await res.json();
      if (!res.ok || !data.uploads || data.uploads.length === 0) { container.innerHTML = ""; return; }
      container.innerHTML = data.uploads.map(u =>
        `<span class="chip"><span>${u.filename}</span><span class="chip-size">${fmtSize(u.size)}</span></span>`
      ).join("");
    } catch (e) {
      container.innerHTML = "";
    }
  }

  loadUploadedFiles();

  filePreviewUploadBtn.addEventListener("click", async () => {
    if (!selectedFile) return;
    if (!sessionId) { alert("No active session — please wait."); return; }

    const filename = selectedFile.name;
    const formData = new FormData();
    formData.append("file",       selectedFile);
    formData.append("session_id", sessionId);

    filePreviewUploadBtn.disabled    = true;
    filePreviewUploadBtn.textContent = "Upload";

    try {
      const res  = await fetch("/api/upload", { method: "POST", body: formData });
      const data = await res.json();
      if (!res.ok) {
        alert("Upload failed: " + (data.error || "Unknown error"));
        filePreviewUploadBtn.disabled    = false;
        filePreviewUploadBtn.textContent = "Upload";
      } else {
        clearSelectedFile();
        loadUploadedFiles();
        // Auto-send a chat message so the bot acknowledges the upload.
        // isUploadMessage=true prevents this from updating the stage UI.
        await sendChatMessage(`I just uploaded ${filename}.`, { isUploadMessage: true });
        // If at the summary stage, auto-regenerate the summary after the bot responds
        if (currentStage === "summary") {
          const card    = document.getElementById("summaryCard");
          const bodyEl  = document.getElementById("summaryText");
          const toggleBtn = document.getElementById("toggleSummaryBtn");
          try {
            const regenRes  = await fetch(`/api/session/${sessionId}/summary`, { method: "POST" });
            const regenData = await regenRes.json();
            if (regenRes.ok && regenData.summary) {
              bodyEl.textContent = regenData.summary;
              bodyEl.classList.add("collapsed");
              bodyEl.classList.remove("expanded");
              toggleBtn.textContent = "Show Full Summary";
              card.style.display = "block";
              summaryVersion++;   // increment ONLY here, after confirmed new summary received
              updateSummaryMeta();
              pulseSummaryCard();
              showSummaryToast();
            } else {
              appendMessage("bot", "Note: summary could not be updated automatically. Use the Regenerate button.");
            }
          } catch (e) {
            appendMessage("bot", "Note: summary could not be updated automatically. Use the Regenerate button.");
          }
        }
      }
    } catch (e) {
      alert("Network error during upload.");
      filePreviewUploadBtn.disabled    = false;
      filePreviewUploadBtn.textContent = "Upload";
    }
  });

  // ─────────────────────────────────────────────
  // Startup — runs after all functions are defined
  // ─────────────────────────────────────────────
  initSession();
</script>
</body>
</html>
